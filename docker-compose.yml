version: "3.8"

services:
  consciousness-sea:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: consciousness-sea
    ports:
      - "8111:8111"
    volumes:
      - consciousness-sea-data:/app/data
      - consciousness-sea-checkpoints:/app/checkpoints
      - ./certs:/app/certs:ro
    environment:
      - CONSCIOUSNESS_SEA_DATA_DIR=/app/data
      - CONSCIOUSNESS_SEA_API_HOST=0.0.0.0
      - CONSCIOUSNESS_SEA_API_PORT=8111
      - CONSCIOUSNESS_SEA_API_KEY=${CONSCIOUSNESS_SEA_API_KEY:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - JWT_EXPIRATION_HOURS=${JWT_EXPIRATION_HOURS:-24}
      - SSL_CERTFILE=${SSL_CERTFILE:-}
      - SSL_KEYFILE=${SSL_KEYFILE:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8111/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: consciousness-sea-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      consciousness-sea:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.0.0
    container_name: consciousness-sea-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana-dashboard.json:/etc/grafana/provisioning/dashboards/consciousness-sea.json:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  consciousness-sea-data:
  consciousness-sea-checkpoints:
  prometheus-data:
  grafana-data:
